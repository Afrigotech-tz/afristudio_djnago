<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>New Contact Message — AfriStudio</title>
</head>
<body style="font-family:sans-serif;color:#1a1a1a;max-width:560px;margin:0 auto;padding:24px;">
  <h2 style="color:#b45309;">New Contact Message</h2>
  <p>Someone submitted a message via the AfriStudio contact form.</p>
  <table style="width:100%;border-collapse:collapse;margin-top:16px;">
    <tr>
      <td style="padding:8px 12px;background:#f5f5f4;font-weight:600;width:120px;">From</td>
      <td style="padding:8px 12px;border-bottom:1px solid #e7e5e4;">{{ sender_name }}</td>
    </tr>
    <tr>
      <td style="padding:8px 12px;background:#f5f5f4;font-weight:600;">Email</td>
      <td style="padding:8px 12px;border-bottom:1px solid #e7e5e4;">{{ sender_email }}</td>
    </tr>
    <tr>
      <td style="padding:8px 12px;background:#f5f5f4;font-weight:600;">Subject</td>
      <td style="padding:8px 12px;border-bottom:1px solid #e7e5e4;">{{ subject }}</td>
    </tr>
    <tr>
      <td style="padding:8px 12px;background:#f5f5f4;font-weight:600;vertical-align:top;">Message</td>
      <td style="padding:8px 12px;">{{ message_body|linebreaks }}</td>
    </tr>
  </table>
  <hr style="margin-top:32px;border:none;border-top:1px solid #e7e5e4;" />
  <p style="font-size:12px;color:#78716c;">AfriStudio — Admin Notification</p>
</body>
</html>
